backend:
  name: git-gateway
  branch: main

media_folder: "media/uploads"
public_folder: "/media/uploads"

collections:
  - name: "site_data"
    label: "Site Data"
    files:
      - label: "Photo Albums Data"
        name: "photo_albums_data"
        file: "data/photo-albums.json"
        format: "json"
        fields:
          - label: "Photo Albums"
            name: "albums"
            widget: "list"
            summary: "{{fields.title}}"
            collapsed: false
            fields:
              - label: "Album Title"
                name: "title"
                widget: "string"
                hint: "Name it whatever you want. Example: Dry Branch GP - April 12 or Practice Day."

              - label: "Album Date"
                name: "date"
                widget: "datetime"
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
                hint: "Used to sort newest first on the homepage and album pages."

              - label: "Published"
                name: "published"
                widget: "boolean"
                default: true
                hint: "Turn this on when the album is ready to show on the site."

              - label: "Weekend Album"
                name: "weekend_album"
                widget: "boolean"
                default: false
                hint: "Turn this on if you want separate Saturday and Sunday sections."

              - label: "Cover Image"
                name: "cover"
                widget: "image"
                required: false
                hint: "The preview image shown on the homepage and album page."

              - label: "Single Album Photos"
                name: "items"
                widget: "list"
                required: false
                hint: "Use this when it is just one album with photos directly inside it."
                field:
                  label: "Photo"
                  name: "photo"
                  widget: "image"

              - label: "Saturday Photos"
                name: "saturday_items"
                widget: "list"
                required: false
                hint: "Only use this for a weekend album."
                field:
                  label: "Saturday Photo"
                  name: "photo"
                  widget: "image"

              - label: "Sunday Photos"
                name: "sunday_items"
                widget: "list"
                required: false
                hint: "Only use this for a weekend album."
                field:
                  label: "Sunday Photo"
                  name: "photo"
                  widget: "image"

      - label: "Video Albums Data"
        name: "video_albums_data"
        file: "data/video-albums.json"
        format: "json"
        fields:
          - label: "Video Albums"
            name: "albums"
            widget: "list"
            summary: "{{fields.title}}"
            collapsed: false
            fields:
              - label: "Album Title"
                name: "title"
                widget: "string"
                hint: "Name it whatever you want. Example: Dry Branch GP - April 12 or Practice Day Videos."

              - label: "Album Date"
                name: "date"
                widget: "datetime"
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
                hint: "Used to sort newest first on the homepage and album pages."

              - label: "Published"
                name: "published"
                widget: "boolean"
                default: true
                hint: "Turn this on when the album is ready to show on the site."

              - label: "Weekend Album"
                name: "weekend_album"
                widget: "boolean"
                default: false
                hint: "Turn this on if you want separate Saturday and Sunday sections."

              - label: "Cover Image"
                name: "cover"
                widget: "image"
                required: false
                hint: "The preview image shown on the homepage and album page."

              - label: "Single Album Videos"
                name: "items"
                widget: "list"
                required: false
                hint: "Use this when it is just one album with videos directly inside it."
                field:
                  label: "Video"
                  name: "video"
                  widget: "file"

              - label: "Saturday Videos"
                name: "saturday_items"
                widget: "list"
                required: false
                hint: "Only use this for a weekend album."
                field:
                  label: "Saturday Video"
                  name: "video"
                  widget: "file"

              - label: "Sunday Videos"
                name: "sunday_items"
                widget: "list"
                required: false
                hint: "Only use this for a weekend album."
                field:
                  label: "Sunday Video"
                  name: "video"
                  widget: "file"
