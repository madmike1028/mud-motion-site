backend:
  name: git-gateway
  branch: main

media_folder: "media/uploads"
public_folder: "/media/uploads"

collections:
  - name: "site_data"
    label: "Site Data"
    files:
      - label: "Photo Albums Data"
        name: "photo_albums_data"
        file: "data/photo-albums.json"
        format: "json"
        fields:
          - label: "Photo Albums"
            name: "albums"
            widget: "list"
            summary: "{{fields.title}}"
            collapsed: false
            fields:
              - { label: "Album Title", name: "title", widget: "string" }
              - { label: "Album Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "Location", name: "location", widget: "string", required: false }
              - { label: "Show on Site", name: "published", widget: "boolean", default: true }
              - label: "Cover Picture"
                name: "cover"
                widget: "image"
                required: false
                hint: "Pick the album cover image here."
              - { label: "Weekend Album", name: "weekend_album", widget: "boolean", default: false, required: false }
              - label: "Single Album Photos"
                name: "items"
                widget: "list"
                required: false
                collapsed: false
                summary: "{{fields.photo}}"
                field:
                  label: "Photo"
                  name: "photo"
                  widget: "image"
                  media_library:
                    config:
                      multiple: true
              - label: "Saturday Photos"
                name: "saturday_items"
                widget: "list"
                required: false
                collapsed: false
                summary: "{{fields.photo}}"
                field:
                  label: "Saturday Photo"
                  name: "photo"
                  widget: "image"
                  media_library:
                    config:
                      multiple: true
              - label: "Sunday Photos"
                name: "sunday_items"
                widget: "list"
                required: false
                collapsed: false
                summary: "{{fields.photo}}"
                field:
                  label: "Sunday Photo"
                  name: "photo"
                  widget: "image"
                  media_library:
                    config:
                      multiple: true

      - label: "Video Albums Data"
        name: "video_albums_data"
        file: "data/video-albums.json"
        format: "json"
        fields:
          - label: "Video Albums"
            name: "albums"
            widget: "list"
            summary: "{{fields.title}}"
            collapsed: false
            fields:
              - { label: "Album Title", name: "title", widget: "string" }
              - { label: "Album Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "Location", name: "location", widget: "string", required: false }
              - { label: "Show on Site", name: "published", widget: "boolean", default: true }
              - label: "Cover Picture"
                name: "cover"
                widget: "image"
                required: false
              - { label: "Weekend Album", name: "weekend_album", widget: "boolean", default: false, required: false }
              - label: "Single Album Videos"
                name: "items"
                widget: "list"
                required: false
                collapsed: false
                summary: "{{fields.video}}"
                field:
                  label: "Video"
                  name: "video"
                  widget: "file"
                  media_library:
                    config:
                      multiple: true
              - label: "Saturday Videos"
                name: "saturday_items"
                widget: "list"
                required: false
                collapsed: false
                summary: "{{fields.video}}"
                field:
                  label: "Saturday Video"
                  name: "video"
                  widget: "file"
                  media_library:
                    config:
                      multiple: true
              - label: "Sunday Videos"
                name: "sunday_items"
                widget: "list"
                required: false
                collapsed: false
                summary: "{{fields.video}}"
                field:
                  label: "Sunday Video"
                  name: "video"
                  widget: "file"
                  media_library:
                    config:
                      multiple: true
