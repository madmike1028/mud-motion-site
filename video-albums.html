<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video Albums</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --orange:#ff6a00;--orange-dark:#cc5200;--text:#ffffff;--muted:#dddddd;
  --panel:rgba(6,6,6,.56);--panel-border:rgba(255,255,255,.12);
  --shadow:0 15px 40px rgba(0,0,0,.35);--radius:18px;--max-width:1300px
}
html{scroll-behavior:smooth}
body{font-family:Arial,sans-serif;background:#000;color:var(--text);overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
img{display:block;max-width:100%}
.hero{position:relative;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;text-align:center;overflow:hidden;background:#000;isolation:isolate}
.hero-bg{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;object-position:38% center;z-index:-4;transform:scale(1.03);filter:brightness(.62) contrast(1.02)}
.section-shell{scroll-margin-top:140px}
.hero-overlay{position:fixed;inset:0;z-index:-3;pointer-events:none;background:
  radial-gradient(circle at 50% 22%,rgba(255,145,40,.05) 0%,rgba(255,145,40,.01) 16%,rgba(0,0,0,0) 32%),
  linear-gradient(to bottom,rgba(0,0,0,.34) 0%,rgba(0,0,0,.30) 14%,rgba(0,0,0,.32) 28%,rgba(0,0,0,.42) 50%,rgba(0,0,0,.56) 74%,rgba(0,0,0,.74) 100%)}
.hero-vignette{position:fixed;inset:0;z-index:-2;pointer-events:none;background:radial-gradient(circle at center,rgba(0,0,0,0) 44%,rgba(0,0,0,.20) 70%,rgba(0,0,0,.38) 100%)}
.hero-inner{width:min(94vw,1300px);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:0 18px 14px}
.hero-content{position:relative;width:100%;max-width:1180px;display:flex;flex-direction:column;align-items:center;gap:4px;animation:fadeUp .8s ease;transform:translateY(-30px)}
.hero-lower{display:flex;flex-direction:column;align-items:center;transform:translateY(-28px);transition:transform .28s ease;width:100%}
.hero-logo-wrap{position:relative;display:flex;justify-content:center;align-items:center;width:min(92vw,1220px);transition:opacity .28s ease,transform .28s ease}
.hero-logo-wrap::before{content:"";position:absolute;inset:-10px -30px -6px -30px;border-radius:999px;pointer-events:none;background:radial-gradient(circle at center,rgba(0,0,0,0) 36%,rgba(0,0,0,.12) 58%,rgba(0,0,0,.24) 76%,rgba(0,0,0,.34) 100%);filter:blur(18px);z-index:-1}
.hero.scrolled .hero-logo-wrap{opacity:.22;transform:translateY(-10px) scale(.985)}
.hero.scrolled .hero-lower{transform:translateY(-64px)}
.hero-logo{width:min(90vw,900px);height:auto;margin:0 auto 6px;transform:scale(1.28);transform-origin:center center;filter:drop-shadow(0 18px 34px rgba(0,0,0,.46)) drop-shadow(0 0 24px rgba(0,0,0,.20));opacity:.965;pointer-events:none}
.hero-actions{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:-24px;margin-bottom:18px;max-width:900px}
.hero-action,.mini-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:999px;background:rgba(0,0,0,.54);border:1px solid rgba(255,255,255,.20);color:#fff;font-weight:700;transition:.22s ease;box-shadow:var(--shadow);backdrop-filter:blur(4px);cursor:pointer}
.hero-action:hover,.mini-btn:hover,.mini-btn.active{transform:translateY(-2px);background:var(--orange);border-color:transparent}
.hero-socials{display:flex;flex-wrap:nowrap;justify-content:space-between;align-items:center;width:min(520px,64vw);gap:0;margin-top:0;margin-bottom:18px}
.social-icon-link{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;transition:transform .2s ease,filter .2s ease}
.social-icon-link:hover{transform:translateY(-2px) scale(1.10);filter:drop-shadow(0 0 10px rgba(255,255,255,.28))}
.social-icon-link svg{width:30px;height:30px;display:block}
.facebook-icon{fill:#1877F2}
.instagram-icon{fill:url(#instagramGradient)}
.snapchat-icon{fill:#FFFC00}
.email-icon{fill:#ffffff}
.content-wrap{position:relative;z-index:2;margin-top:-18px}
.section-shell{width:min(94vw,var(--max-width));margin:0 auto 22px;background:var(--panel);border:1px solid var(--panel-border);border-radius:24px;box-shadow:var(--shadow);backdrop-filter:blur(4px);overflow:hidden}
.section{padding:24px 22px}
.section-title{font-size:clamp(24px,2vw,36px);font-weight:900;text-transform:uppercase;margin-bottom:8px}
.section-subtitle{color:var(--muted);line-height:1.45;margin-bottom:20px}
.album-grid.page-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:18px}
.album-card{position:relative;border-radius:var(--radius);overflow:hidden;min-height:180px;cursor:pointer;border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow);background:#101010;transition:transform .25s ease,box-shadow .25s ease}
.album-card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(0,0,0,.42)}
.album-card img,.album-card video{width:100%;height:100%;object-fit:cover;display:block}
.album-card::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.55),rgba(0,0,0,0) 42%)}
.album-info{position:absolute;left:18px;right:18px;bottom:18px;z-index:2}
.album-title{font-size:18px;font-weight:900;margin-bottom:8px;color:var(--orange);text-shadow:0 0 8px rgba(0,0,0,.9),0 2px 6px rgba(0,0,0,.8)}
.album-meta{color:var(--orange);font-size:14px;font-weight:700;text-shadow:0 0 8px rgba(0,0,0,.9),0 2px 6px rgba(0,0,0,.8)}
.day-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;width:min(92%,980px)}
.day-card{position:relative;border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.44);border-radius:18px;overflow:hidden;min-height:260px;cursor:pointer;box-shadow:var(--shadow)}
.day-card img,.day-card video{width:100%;height:100%;object-fit:cover;display:block}
.day-card::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.62),rgba(0,0,0,.06) 44%)}
.day-card-label{position:absolute;left:18px;right:18px;bottom:18px;z-index:2;color:var(--orange);font-size:24px;font-weight:900;text-shadow:0 0 8px rgba(0,0,0,.9),0 2px 6px rgba(0,0,0,.8)}
.modal{position:fixed;inset:0;z-index:999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.82);padding:18px}
.modal.active{display:flex}
.modal-box{position:relative;width:min(96vw,1250px);max-height:94vh;background:rgba(12,12,12,.96);border:1px solid rgba(255,255,255,.08);border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:popFast .18s ease}
.modal-top{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);flex-wrap:wrap}
.modal-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.modal-title{font-weight:900;font-size:20px;text-transform:uppercase}
.close-btn{border:0;background:rgba(0,0,0,.54);color:#fff;width:42px;height:42px;border-radius:999px;font-size:22px;cursor:pointer}
.viewer{position:relative;display:flex;align-items:center;justify-content:center;min-height:65vh;background:#060606;overflow:hidden}
.viewer-media-wrap{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;width:100%;min-height:65vh;padding:10px}
.viewer-media-wrap img,.viewer-media-wrap video{max-width:100%;max-height:68vh;object-fit:contain;display:block}
.viewer-media-wrap img{cursor:zoom-in}
.viewer-media-wrap.zoomed img{cursor:zoom-out}
.viewer-media-wrap video{width:min(100%,1100px);background:#000}
.viewer-media-wrap.zoomed{position:fixed;inset:0;z-index:1002;background:rgba(0,0,0,.96);padding:24px;min-height:100vh}
.viewer-media-wrap.zoomed img{max-width:96vw;max-height:92vh}
.zoom-close{position:fixed;top:18px;right:18px;z-index:1004;width:50px;height:50px;border:0;border-radius:999px;background:rgba(255,255,255,.14);color:#fff;font-size:28px;cursor:pointer;display:none}
.zoom-close.active{display:block}
.viewer-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:1005;width:54px;height:54px;border-radius:999px;border:0;cursor:pointer;background:rgba(0,0,0,.58);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center}
.viewer-prev{left:16px}.viewer-next{right:16px}
.viewer-dust{position:absolute;inset:0;pointer-events:none;z-index:4;opacity:0}
.viewer.dust-burst .viewer-dust{opacity:1;animation:dustBurst .65s ease forwards}
.viewer-dust::before,.viewer-dust::after{content:"";position:absolute;top:50%;width:340px;height:340px;border-radius:999px;transform:translateY(-50%);background:radial-gradient(circle,rgba(183,126,63,.72) 0%,rgba(160,104,44,.52) 22%,rgba(120,78,34,.28) 44%,rgba(88,57,25,.12) 62%,rgba(88,57,25,0) 80%);filter:blur(7px)}
.viewer-dust::before{left:-90px}.viewer-dust::after{right:-90px}
.thumb-strip{display:flex;gap:10px;overflow-x:auto;padding:14px 16px 16px;background:rgba(255,255,255,.03);border-top:1px solid rgba(255,255,255,.08)}
.thumb{flex:0 0 auto;width:96px;height:72px;border-radius:12px;overflow:hidden;border:2px solid transparent;cursor:pointer;background:#111}
.thumb.active{border-color:var(--orange)}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover}
.back-to-top{position:fixed;right:20px;bottom:20px;z-index:1100;width:52px;height:52px;border:0;border-radius:999px;background:rgba(0,0,0,.62);color:#fff;font-size:24px;cursor:pointer;box-shadow:0 10px 24px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(6px);opacity:0;visibility:hidden;transform:translateY(10px);transition:opacity .22s ease,transform .22s ease,visibility .22s ease,background .22s ease}
.back-to-top.show{opacity:1;visibility:visible;transform:translateY(0)}
.back-to-top:hover{background:var(--orange)}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes popFast{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes dustBurst{0%{opacity:1}100%{opacity:0}}
@media (max-width:1050px){.album-grid.page-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:760px){
.hero-bg{object-position:50% center}.hero-inner{padding:10px 14px 18px}.hero-content{transform:translateY(-20px)}.hero-lower{transform:translateY(-12px)}
.hero-logo{width:min(96vw,760px);margin-bottom:4px;transform:scale(1.18);transform-origin:center center}.hero-actions{flex-direction:column;width:100%;align-items:center}
.hero-socials{width:min(320px,82vw);gap:0;margin-bottom:16px}
.hero-action,.mini-btn{width:min(88vw,360px)}.content-wrap{margin-top:-6px}.album-grid.page-grid{grid-template-columns:1fr}.section{padding:20px 14px}
.viewer{min-height:48vh}.viewer-media-wrap{min-height:48vh}.viewer-nav{width:46px;height:46px}.modal-left{width:100%}.zoom-close{top:12px;right:12px}.back-to-top{width:48px;height:48px;right:14px;bottom:14px}
}
</style>

<script>

const GITHUB_CONFIG = {
  owner: "madmike1028",
  repo: "mud-motion-site",
  branch: "main",
  photoRoot: "media/photo-albums",
  videoRoot: "media/video-albums"
};

const FILE_TYPES = {
  image: /\.(avif|webp|png|jpe?g|gif)$/i,
  video: /\.(mp4|webm|mov|m4v|ogg)$/i
};

function esc(text) {
  return String(text || "").replace(/[&<>\"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function encodeGitHubPath(path) {
  return path.split('/').map(encodeURIComponent).join('/');
}

async function getGitHubContents(path) {
  const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${encodeGitHubPath(path)}?ref=${encodeURIComponent(GITHUB_CONFIG.branch)}`;
  const res = await fetch(url);
  if (!res.ok) {
    if (res.status === 404) return [];
    throw new Error(`GitHub contents failed for ${path}: ${res.status}`);
  }
  return await res.json();
}

async function getLastModified(url) {
  if (!url) return 0;
  try {
    const res = await fetch(url, { method: 'HEAD' });
    const value = res.headers.get('last-modified');
    const stamp = value ? new Date(value).getTime() : 0;
    return Number.isFinite(stamp) ? stamp : 0;
  } catch {
    return 0;
  }
}

function prettifyName(name) {
  return decodeURIComponent(String(name || ''))
    .replace(/[_-]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function isImageFile(item) {
  return item && item.type === 'file' && FILE_TYPES.image.test(item.name || '');
}

function isVideoFile(item) {
  return item && item.type === 'file' && FILE_TYPES.video.test(item.name || '');
}

function getMediaFiles(contents, type) {
  const checker = type === 'video' ? isVideoFile : isImageFile;
  return (contents || [])
    .filter(checker)
    .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
}

function pickCover(files, type) {
  const image = (files || []).find(isImageFile);
  if (image) {
    return { url: image.download_url, kind: 'image', stampUrl: image.download_url };
  }
  const media = type === 'video' ? (files || []).find(isVideoFile) : (files || []).find(isImageFile);
  if (media) {
    return { url: media.download_url, kind: type === 'video' ? 'video' : 'image', stampUrl: media.download_url };
  }
  return {
    url: type === 'video' ? 'video-header.png' : 'photo-header.png',
    kind: 'image',
    stampUrl: null
  };
}

async function buildDay(dayDir, type) {
  if (!dayDir) return null;
  const contents = await getGitHubContents(dayDir.path);
  const mediaFiles = getMediaFiles(contents, type);
  if (!mediaFiles.length) return null;
  const cover = pickCover(contents.filter(item => item.type === 'file'), type);
  const stamp = await getLastModified(cover.stampUrl || mediaFiles[0].download_url);
  return {
    title: prettifyName(dayDir.name),
    coverUrl: cover.url,
    coverKind: cover.kind,
    items: mediaFiles.map(file => file.download_url),
    stamp
  };
}

async function buildAlbum(folder, type) {
  const contents = await getGitHubContents(folder.path);
  const files = (contents || []).filter(item => item.type === 'file');
  const dirs = (contents || []).filter(item => item.type === 'dir');
  const directMedia = getMediaFiles(contents, type);

  const saturdayDir = dirs.find(dir => /^saturday$/i.test(dir.name));
  const sundayDir = dirs.find(dir => /^sunday$/i.test(dir.name));
  const isWeekend = Boolean(saturdayDir || sundayDir);

  if (isWeekend) {
    const days = [];
    const saturday = await buildDay(saturdayDir, type);
    const sunday = await buildDay(sundayDir, type);
    if (saturday) days.push(saturday);
    if (sunday) days.push(sunday);
    if (!days.length && !directMedia.length) return null;

    const rootCover = pickCover(files, type);
    const coverUrl = rootCover.stampUrl ? rootCover.url : (days[0] ? days[0].coverUrl : rootCover.url);
    const coverKind = rootCover.stampUrl ? rootCover.kind : (days[0] ? days[0].coverKind : rootCover.kind);
    const stampCandidates = [await getLastModified(rootCover.stampUrl)];
    days.forEach(day => stampCandidates.push(day.stamp || 0));

    return {
      title: prettifyName(folder.name),
      folderName: folder.name,
      type,
      isWeekend: true,
      coverUrl,
      coverKind,
      items: [],
      days,
      stamp: Math.max(...stampCandidates, 0)
    };
  }

  if (!directMedia.length) return null;
  const cover = pickCover(files, type);
  return {
    title: prettifyName(folder.name),
    folderName: folder.name,
    type,
    isWeekend: false,
    coverUrl: cover.url,
    coverKind: cover.kind,
    items: directMedia.map(file => file.download_url),
    days: [],
    stamp: await getLastModified(cover.stampUrl || directMedia[0].download_url)
  };
}

async function loadAlbums(type) {
  const root = type === 'video' ? GITHUB_CONFIG.videoRoot : GITHUB_CONFIG.photoRoot;
  const rootContents = await getGitHubContents(root);
  const folders = (rootContents || []).filter(item => item.type === 'dir');
  const albums = (await Promise.all(folders.map(folder => buildAlbum(folder, type)))).filter(Boolean);
  return albums.sort((a, b) => (b.stamp || 0) - (a.stamp || 0) || a.title.localeCompare(b.title));
}

function renderCoverMarkup(album) {
  const title = esc(album.title);
  if (album.coverKind === 'video') {
    return `<video src="${album.coverUrl}" muted autoplay loop playsinline preload="metadata" aria-label="${title}"></video>`;
  }
  return `<img src="${album.coverUrl}" alt="${title}">`;
}

function burstDust() {
  viewer.classList.remove('dust-burst');
  void viewer.offsetWidth;
  viewer.classList.add('dust-burst');
}

function wireThumbs() {
  document.querySelectorAll('.thumb').forEach(thumb => {
    thumb.addEventListener('click', () => {
      currentIndex = Number(thumb.dataset.index);
      renderViewer();
    });
  });
}

function setZoomState(state) {
  zoomed = state;
  const activePhoto = document.getElementById('activePhoto');
  viewerMedia.classList.toggle('zoomed', state);
  zoomCloseBtn.classList.toggle('active', state);
  thumbStrip.style.display = state ? 'none' : 'flex';
  if (activePhoto) activePhoto.style.cursor = state ? 'zoom-out' : 'zoom-in';
}

function wireImageZoom() {
  const activePhoto = document.getElementById('activePhoto');
  if (!activePhoto) return;
  activePhoto.addEventListener('click', () => setZoomState(true));
  activePhoto.addEventListener('dblclick', () => setZoomState(false));
}

function renderViewer() {
  const file = currentAlbum[currentIndex];
  const isVideo = currentType === 'video';
  if (!file) return;

  prevBtn.style.display = currentAlbum.length > 1 ? 'flex' : 'none';
  nextBtn.style.display = currentAlbum.length > 1 ? 'flex' : 'none';
  thumbStrip.style.display = 'flex';

  if (isVideo) {
    viewerMedia.innerHTML = `<video src="${file}" controls playsinline></video>`;
  } else {
    viewerMedia.innerHTML = `<img src="${file}" alt="${esc(currentAlbumTitle)} image ${currentIndex + 1}" id="activePhoto">`;
  }

  thumbStrip.innerHTML = currentAlbum.map((item, index) => {
    const activeClass = index === currentIndex ? 'thumb active' : 'thumb';
    if (currentType === 'video') {
      return `<div class="${activeClass}" data-index="${index}"><video src="${item}" muted></video></div>`;
    }
    return `<div class="${activeClass}" data-index="${index}"><img src="${item}" alt="Thumbnail ${index + 1}"></div>`;
  }).join('');

  burstDust();
  wireThumbs();
  wireImageZoom();
  setZoomState(zoomed);
}

function renderDayChooser() {
  if (!currentAlbumMeta || !currentAlbumMeta.days?.length) return;
  prevBtn.style.display = 'none';
  nextBtn.style.display = 'none';
  thumbStrip.style.display = 'none';
  zoomCloseBtn.classList.remove('active');
  viewerMedia.classList.remove('zoomed');
  viewerMedia.innerHTML = `<div class="day-grid">${currentAlbumMeta.days.map((day, index) => `
    <button class="day-card" data-day-index="${index}">
      ${day.coverKind === 'video' ? `<video src="${day.coverUrl}" muted autoplay loop playsinline preload="metadata"></video>` : `<img src="${day.coverUrl}" alt="${esc(day.title)}">`}
      <span class="day-card-label">${esc(day.title)}</span>
    </button>
  `).join('')}</div>`;
  document.querySelectorAll('[data-day-index]').forEach(btn => {
    btn.addEventListener('click', () => openAlbumDay(Number(btn.dataset.dayIndex)));
  });
}

function renderAlbumSwitches() {
  const source = currentType === 'video' ? currentSourceVideoAlbums : currentSourcePhotoAlbums;
  const albumTabs = source.map((album, index) => `
    <button class="mini-btn ${currentAlbumIndex === index ? 'active' : ''}" data-switch-type="${currentType}" data-switch-index="${index}">${esc(album.title)}</button>
  `).join('');

  const dayTabs = currentAlbumMeta && currentAlbumMeta.isWeekend ? `
    <button class="mini-btn ${currentDayView === null ? 'active' : ''}" data-day-mode="chooser">Weekend</button>
    ${currentAlbumMeta.days.map((day, index) => `<button class="mini-btn ${currentDayView === index ? 'active' : ''}" data-day-mode="${index}">${esc(day.title)}</button>`).join('')}
  ` : '';

  albumSwitchRow.innerHTML = albumTabs + dayTabs;

  albumSwitchRow.querySelectorAll('[data-switch-type]').forEach(btn => {
    btn.addEventListener('click', () => openAlbum(btn.dataset.switchType, Number(btn.dataset.switchIndex)));
  });

  albumSwitchRow.querySelectorAll('[data-day-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      const mode = btn.dataset.dayMode;
      if (mode === 'chooser') {
        currentDayView = null;
        currentAlbumTitle = currentAlbumMeta.title;
        modalTitle.textContent = currentAlbumMeta.title;
        renderAlbumSwitches();
        renderDayChooser();
      } else {
        openAlbumDay(Number(mode));
      }
    });
  });
}

function openAlbumDay(dayIndex) {
  if (!currentAlbumMeta || !currentAlbumMeta.days?.[dayIndex]) return;
  const day = currentAlbumMeta.days[dayIndex];
  currentAlbum = day.items;
  currentIndex = 0;
  currentDayView = dayIndex;
  currentAlbumTitle = `${currentAlbumMeta.title} - ${day.title}`;
  modalTitle.textContent = currentAlbumTitle;
  renderAlbumSwitches();
  renderViewer();
}

function openAlbum(type, albumIndex) {
  currentType = type;
  currentAlbumIndex = albumIndex;
  currentSourceAlbums = type === 'video' ? currentSourceVideoAlbums : currentSourcePhotoAlbums;
  currentAlbumMeta = currentSourceAlbums[albumIndex];
  if (!currentAlbumMeta) return;

  zoomed = false;
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';

  if (currentAlbumMeta.isWeekend && currentAlbumMeta.days?.length) {
    currentDayView = null;
    currentAlbumTitle = currentAlbumMeta.title;
    modalTitle.textContent = currentAlbumMeta.title;
    renderAlbumSwitches();
    renderDayChooser();
    return;
  }

  currentAlbum = currentAlbumMeta.items;
  currentIndex = 0;
  currentDayView = null;
  currentAlbumTitle = currentAlbumMeta.title;
  modalTitle.textContent = currentAlbumMeta.title;
  renderAlbumSwitches();
  renderViewer();
}

function showPrev() {
  currentIndex = (currentIndex - 1 + currentAlbum.length) % currentAlbum.length;
  renderViewer();
}

function showNext() {
  currentIndex = (currentIndex + 1) % currentAlbum.length;
  renderViewer();
}

function closeViewer() {
  modal.classList.remove('active');
  document.body.style.overflow = '';
  viewerMedia.innerHTML = '';
  thumbStrip.innerHTML = '';
  thumbStrip.style.display = 'flex';
  setZoomState(false);
}

const gridEl = document.getElementById('pageAlbums');
const modal = document.getElementById('mediaModal');
const modalTitle = document.getElementById('modalTitle');
const viewerMedia = document.getElementById('viewerMedia');
const thumbStrip = document.getElementById('thumbStrip');
const closeModal = document.getElementById('closeModal');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const viewer = document.getElementById('viewer');
const modalHomeBtn = document.getElementById('modalHomeBtn');
const albumSwitchRow = document.getElementById('albumSwitchRow');
const zoomCloseBtn = document.getElementById('zoomCloseBtn');
const fullPhotoAlbumsBtn = document.getElementById('fullPhotoAlbumsBtn');
const fullVideoAlbumsBtn = document.getElementById('fullVideoAlbumsBtn');
const backToTop = document.getElementById('backToTop');

let allVideoAlbums = [];
let currentSourceAlbums = [];
let currentSourcePhotoAlbums = [];
let currentSourceVideoAlbums = [];
let currentAlbumMeta = null;
let currentAlbum = [];
let currentIndex = 0;
let currentType = 'video';
let currentAlbumTitle = '';
let currentAlbumIndex = 0;
let currentDayView = null;
let zoomed = false;

function createPageCards() {
  currentSourceAlbums = allVideoAlbums;
  currentSourcePhotoAlbums = [];
  currentSourceVideoAlbums = allVideoAlbums;
  gridEl.innerHTML = allVideoAlbums.length ? allVideoAlbums.map((album, index) => `
    <div class="album-card" data-type="video" data-album="${index}">
      ${renderCoverMarkup(album)}
      <div class="album-info">
        <div class="album-title">${esc(album.title)}</div>
        <div class="album-meta">${album.isWeekend ? `${album.days.length} day weekend` : `${album.items.length} videos`}</div>
      </div>
    </div>
  `).join('') : `<div class="section-subtitle" style="margin-bottom:0;">No video albums found yet.</div>`;

  document.querySelectorAll('[data-type][data-album]').forEach(card => {
    card.addEventListener('click', () => openAlbum('video', Number(card.dataset.album)));
  });
}


prevBtn.addEventListener('click', showPrev);
nextBtn.addEventListener('click', showNext);
closeModal.addEventListener('click', closeViewer);
zoomCloseBtn.addEventListener('click', () => setZoomState(false));
modalHomeBtn.addEventListener('click', () => { closeViewer(); window.location.href = 'index.html'; });
fullPhotoAlbumsBtn.addEventListener('click', () => { closeViewer(); window.location.href = 'photo-albums.html'; });
fullVideoAlbumsBtn.addEventListener('click', () => { closeViewer(); window.location.href = 'video-albums.html'; });
modal.addEventListener('click', (e) => { if (e.target === modal) closeViewer(); });

document.addEventListener('keydown', (e) => {
  if (!modal.classList.contains('active')) return;
  if (e.key === 'Escape') {
    if (zoomed) setZoomState(false);
    else closeViewer();
  }
  if (thumbStrip.style.display !== 'none') {
    if (e.key === 'ArrowLeft') showPrev();
    if (e.key === 'ArrowRight') showNext();
  }
});

window.addEventListener('scroll', () => {
  if (window.scrollY > 18) document.querySelector('.hero')?.classList.add('scrolled');
  else document.querySelector('.hero')?.classList.remove('scrolled');

  if (window.scrollY > 250) backToTop.classList.add('show');
  else backToTop.classList.remove('show');
});

backToTop.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});


async function boot() {
  try {
    allVideoAlbums = await loadAlbums('video');
    createPageCards();
  } catch (error) {
    console.error(error);
    gridEl.innerHTML = `<div class="section-subtitle" style="margin-bottom:0;">Could not load video albums yet.</div>`;
  }
}

boot();

</script>
</body>
</html>
