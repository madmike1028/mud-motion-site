<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mud & Motion Photography</title>
<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}
.header{height:400px;background:url('hero.jpg') center/cover no-repeat;display:flex;align-items:flex-end;justify-content:center}
.nav{display:flex;gap:10px;margin-bottom:20px}
.btn{padding:10px 18px;border-radius:999px;background:#111;border:1px solid #444;color:#fff;text-decoration:none}
.section{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
.card{background:#111;padding:10px;border-radius:10px}
.card img{width:100%;border-radius:10px}
.footer{padding:20px;text-align:center}
</style>
</head>
<body>

<div class="header">
  <div class="nav">
    <a href="index.html" class="btn">Home</a>
    <a href="photo-albums.html" class="btn">Photo Albums</a>
    <a href="video-albums.html" class="btn">Video Albums</a>
  </div>
</div>

<div class="section">
<h2>Latest Photo Albums</h2>
<div id="photoGrid" class="grid"></div>
</div>

<div class="section">
<h2>Latest Video Albums</h2>
<div id="videoGrid" class="grid"></div>
</div>

<div class="section">
<img src="schedule.jpg" style="width:100%">
</div>

<div class="footer">
Mud & Motion Photography
</div>

<script>
async function loadPhotos(){
  let res=await fetch('data/photo-albums.json');
  let data=await res.json();
  let albums=(data.albums||[]).filter(a=>a.published).slice(0,3);
  document.getElementById('photoGrid').innerHTML=albums.map(a=>`
    <div class="card">
      <img src="${a.cover||''}">
      <div>${a.title}</div>
    </div>
  `).join('');
}

async function loadVideos(){
  let res=await fetch('data/video-albums.json');
  let data=await res.json();
  let albums=(data.albums||[]).filter(a=>a.published).slice(0,3);
  document.getElementById('videoGrid').innerHTML=albums.map(a=>`
    <div class="card">
      <img src="${a.cover||''}">
      <div>${a.title}</div>
    </div>
  `).join('');
}

loadPhotos();
loadVideos();
</script>

</body>
</html>
