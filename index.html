<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mud & Motion Photography</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: black;
}

/* BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('./background.png') center/cover no-repeat;
  z-index: -2;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  z-index: -1;
}

/* NAV */
.nav {
  display: flex;
  justify-content: center;
  gap: 15px;
  padding: 20px;
}

.btn {
  padding: 10px 20px;
  border-radius: 20px;
  border: 2px solid white;
  color: white;
  text-decoration: none;
}

.btn.active {
  background: orange;
  color: black;
  border: none;
}

/* SECTION */
.section {
  padding: 40px;
}

/* GRID */
.grid {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  width: 300px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.info {
  padding: 10px;
}

.title {
  color: orange;
  font-weight: bold;
}

/* SCHEDULE */
.schedule {
  text-align: center;
}

.schedule img {
  width: 90%;
  max-width: 900px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- NAV -->
<div class="nav">
  <a class="btn active" href="index.html">Home</a>
  <a class="btn" href="photo-albums.html">Photo Albums</a>
  <a class="btn" href="video-albums.html">Video Albums</a>
  <a class="btn" href="#schedule">Schedule</a>
</div>

<!-- PHOTO -->
<div class="section">
  <h2>Latest Photo Albums</h2>
  <div class="grid" id="photoGrid"></div>
</div>

<!-- VIDEO -->
<div class="section">
  <h2>Latest Video Albums</h2>
  <div class="grid" id="videoGrid"></div>
</div>

<!-- SCHEDULE -->
<div class="section schedule" id="schedule">
  <img src="./schedule.jpg">
</div>

<script>
async function loadAlbums() {

  const p = await fetch('./data/photo-albums.json');
  const pd = await p.json();
  const grid = document.getElementById('photoGrid');

  pd.albums.sort((a,b)=> new Date(b.date)-new Date(a.date));

  pd.albums.slice(0,4).forEach(a=>{
    grid.innerHTML += `
      <div class="card">
        <img src="${a.cover_image}">
        <div class="info">
          <div class="title">${a.title}</div>
          <div>${a.images.length} photos</div>
        </div>
      </div>`;
  });

  const v = await fetch('./data/video-albums.json');
  const vd = await v.json();
  const vgrid = document.getElementById('videoGrid');

  vd.albums.sort((a,b)=> new Date(b.date)-new Date(a.date));

  vd.albums.slice(0,4).forEach(a=>{
    vgrid.innerHTML += `
      <div class="card">
        <img src="${a.cover_image}">
        <div class="info">
          <div class="title">${a.title}</div>
          <div>${a.videos.length} videos</div>
        </div>
      </div>`;
  });

}

loadAlbums();
</script>

</body>
</html>
