<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Albums - Mud & Motion</title>

<style>
body{font-family:Arial;background:#000;color:#fff;margin:0}
.hero{height:300px;background:url('photo-header.png') center/cover no-repeat;display:flex;align-items:flex-end;justify-content:center;padding-bottom:20px}
.nav a{margin:5px;padding:10px 15px;border-radius:20px;background:#222;color:#fff;text-decoration:none}
.section{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px}
.card{background:#111;border-radius:10px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:200px;object-fit:cover}
.card h3{padding:10px;margin:0}
</style>
</head>

<body>

<div class="hero">
  <div class="nav">
    <a href="index.html">Home</a>
    <a href="photo-albums.html">Photo Albums</a>
    <a href="video-albums.html">Video Albums</a>
  </div>
</div>

<div class="section">
  <h2>Photo Albums</h2>
  <div id="albums" class="grid"></div>
</div>

<script>

async function loadAlbums(){
  try{
    const res = await fetch('media/photos/index.json');
    const albums = await res.json();

    const container = document.getElementById("albums");
    container.innerHTML = "";

    albums.forEach(album=>{
      if(!album.published || !album.items || album.items.length===0) return;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${album.cover}">
        <h3>${album.title}</h3>
      `;

      div.onclick = ()=>{
        window.open(album.items[0], "_blank");
      };

      container.appendChild(div);
    });

  }catch(err){
    document.getElementById("albums").innerHTML = "<p>No albums found.</p>";
  }
}

loadAlbums();

</script>

</body>
</html>
