<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Albums - Mud & Motion Photography</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --orange: #ff6a00;
      --text: #ffffff;
      --muted: #dddddd;
      --panel: rgba(6, 6, 6, 0.56);
      --panel-border: rgba(255, 255, 255, 0.12);
      --shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
      --radius: 18px;
      --max-width: 1300px;
    }

    html { scroll-behavior: smooth; }
    body { font-family: Arial, sans-serif; background: #000; color: var(--text); overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }
    img { display: block; max-width: 100%; }

    .hero {
      position: relative;
      min-height: 56vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      background: #000;
      isolation: isolate;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: -3;
      filter: brightness(0.72) contrast(1.02);
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 24%, rgba(255,145,40,0.04) 0%, rgba(255,145,40,0.01) 18%, rgba(0,0,0,0.00) 34%),
        linear-gradient(to bottom,
          rgba(0,0,0,0.18) 0%,
          rgba(0,0,0,0.14) 22%,
          rgba(0,0,0,0.26) 50%,
          rgba(0,0,0,0.52) 78%,
          rgba(0,0,0,0.72) 100%);
    }
    .hero-vignette {
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: radial-gradient(circle at center, rgba(0,0,0,0) 52%, rgba(0,0,0,0.14) 76%, rgba(0,0,0,0.28) 100%);
    }
    .hero-inner {
      width: min(94vw, 1300px);
      min-height: 56vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0 18px 30px;
    }
    .hero-content {
      position: relative;
      width: 100%;
      max-width: 1180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.7s ease;
    }
    .hero-logo {
      width: clamp(440px, 58vw, 760px);
      height: auto;
      filter: drop-shadow(0 14px 28px rgba(0,0,0,0.42)) drop-shadow(0 0 20px rgba(0,0,0,0.16));
      opacity: 0.98;
      pointer-events: none;
      margin-bottom: 0;
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 2px;
      max-width: 900px;
    }
    .hero-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(0,0,0,0.54);
      border: 1px solid rgba(255,255,255,0.20);
      color: #fff;
      font-weight: 700;
      transition: 0.22s ease;
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
    }
    .hero-action:hover,
    .hero-action.active {
      transform: translateY(-2px);
      background: var(--orange);
      border-color: transparent;
    }

    .content-wrap { position: relative; z-index: 2; margin-top: -42px; }
    .section-shell {
      width: min(94vw, var(--max-width));
      margin: 0 auto 24px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
      overflow: hidden;
    }
    .section { padding: 24px 22px; }
    .section-title {
      font-size: clamp(24px, 2vw, 36px);
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .section-subtitle {
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 20px;
    }

    .album-grid, .subalbum-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .album-card {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 280px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
      background: #101010;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .album-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.42);
    }
    .album-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .album-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0.00) 42%);
    }
    .album-info {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 2;
    }
    .album-title { font-size: 24px; font-weight: 900; margin-bottom: 10px; }
    .album-meta { color: #efefef; font-size: 14px; line-height: 1.3; }

    .top-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.08);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s ease;
    }
    .back-btn:hover { background: var(--orange); border-color: transparent; }

    .empty-note {
      color: #fff;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 16px;
      border-radius: 16px;
      font-weight: 700;
      display: inline-block;
      min-width: 340px;
      max-width: 100%;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.82);
      padding: 18px;
    }
    .modal.active { display: flex; }
    .modal-box {
      position: relative;
      width: min(96vw, 1250px);
      max-height: 94vh;
      background: rgba(12,12,12,0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: popFast 0.18s ease;
    }
    .modal-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.035);
      flex-wrap: wrap;
    }
    .modal-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .modal-title { font-weight: 900; font-size: 20px; text-transform: uppercase; }
    .mini-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.08);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s ease;
    }
    .mini-btn:hover, .mini-btn.active {
      background: var(--orange);
      border-color: transparent;
    }
    .close-btn {
      border: 0;
      background: rgba(0,0,0,0.54);
      color: #fff;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      font-size: 22px;
      cursor: pointer;
    }

    .viewer {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 65vh;
      background: #060606;
      overflow: hidden;
    }
    .viewer-media-wrap {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 65vh;
      padding: 10px;
    }
    .viewer-media-wrap img {
      max-width: 100%;
      max-height: 68vh;
      object-fit: contain;
      display: block;
      cursor: zoom-in;
    }
    .viewer-media-wrap.zoomed {
      position: fixed;
      inset: 0;
      z-index: 1002;
      background: rgba(0,0,0,0.96);
      padding: 24px;
      min-height: 100vh;
    }
    .viewer-media-wrap.zoomed img {
      max-width: 96vw;
      max-height: 92vh;
      cursor: zoom-out;
    }
    .zoom-close {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 1004;
      width: 50px;
      height: 50px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      display: none;
    }
    .zoom-close.active { display: block; }

    .viewer-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1005;
      width: 54px;
      height: 54px;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      background: rgba(0,0,0,0.58);
      color: #fff;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .viewer-prev { left: 16px; }
    .viewer-next { right: 16px; }

    .thumb-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 14px 16px 16px;
      background: rgba(255,255,255,0.03);
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .thumb {
      flex: 0 0 auto;
      width: 96px;
      height: 72px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      background: #111;
    }
    .thumb.active { border-color: var(--orange); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes popFast {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 1050px) {
      .album-grid, .subalbum-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 760px) {
      .hero { min-height: 46vh; }
      .hero-inner { min-height: 46vh; padding: 0 14px 24px; }
      .hero-logo { width: min(88vw, 520px); }
      .hero-actions { flex-direction: column; width: 100%; align-items: center; }
      .hero-action { width: min(88vw, 360px); }
      .content-wrap { margin-top: -28px; }
      .album-grid, .subalbum-grid { grid-template-columns: 1fr; }
      .section { padding: 20px 14px; }
      .viewer { min-height: 48vh; }
      .viewer-media-wrap { min-height: 48vh; }
      .viewer-nav { width: 46px; height: 46px; }
      .modal-left { width: 100%; }
      .zoom-close { top: 12px; right: 12px; }
      .empty-note { min-width: 0; width: 100%; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <img src="photo-header.png" alt="Photo Albums" class="hero-bg" />
    <div class="hero-overlay"></div>
    <div class="hero-vignette"></div>

    <div class="hero-inner">
      <div class="hero-content">
        <img src="logo.png" alt="Mud & Motion Photography" class="hero-logo" />

        <div class="hero-actions">
          <a href="index.html" class="hero-action">Home</a>
          <a href="photo-albums.html" class="hero-action active">Photo Albums</a>
          <a href="video-albums.html" class="hero-action">Video Albums</a>
        </div>
      </div>
    </div>
  </section>

  <div class="content-wrap">
    <div class="section-shell">
      <section class="section" id="albumsSection">
        <div class="section-title">Photo Albums</div>
        <div class="section-subtitle">
          All live photo albums show here. Weekend albums can open into Saturday and Sunday, and regular albums can still open directly.
        </div>

        <div id="albumsView">
          <div class="album-grid" id="albumGrid"></div>
        </div>

        <div id="subalbumsView" style="display:none;">
          <div class="top-tools">
            <button class="back-btn" id="backToAlbums">← Back to Albums</button>
            <div class="section-title" id="subalbumTitle" style="margin-bottom:0; font-size:28px;"></div>
          </div>
          <div class="section-subtitle" id="subalbumSubtitle" style="margin-bottom:18px;"></div>
          <div class="subalbum-grid" id="subalbumGrid"></div>
        </div>
      </section>
    </div>
  </div>

  <div class="modal" id="mediaModal" aria-hidden="true">
    <div class="modal-box">
      <div class="modal-top">
        <div class="modal-left">
          <button class="mini-btn" id="modalHomeBtn">Home</button>
          <button class="mini-btn" id="albumsBtn">Albums</button>
          <div class="modal-title" id="modalTitle">Album Viewer</div>
        </div>

        <div class="modal-left" id="albumSwitchRow"></div>

        <button class="close-btn" id="closeModal" aria-label="Close">×</button>
      </div>

      <div class="viewer" id="viewer">
        <button class="viewer-nav viewer-prev" id="prevBtn" aria-label="Previous">‹</button>
        <div class="viewer-media-wrap" id="viewerMedia"></div>
        <button class="viewer-nav viewer-next" id="nextBtn" aria-label="Next">›</button>
        <button class="zoom-close" id="zoomCloseBtn" aria-label="Exit fullscreen">×</button>
      </div>

      <div class="thumb-strip" id="thumbStrip"></div>
    </div>
  </div>

  <script>
    const photoAlbumData = [];

    const albumGrid = document.getElementById("albumGrid");
    const albumsView = document.getElementById("albumsView");
    const subalbumsView = document.getElementById("subalbumsView");
    const subalbumTitle = document.getElementById("subalbumTitle");
    const subalbumSubtitle = document.getElementById("subalbumSubtitle");
    const subalbumGrid = document.getElementById("subalbumGrid");
    const backToAlbums = document.getElementById("backToAlbums");

    const modal = document.getElementById("mediaModal");
    const modalTitle = document.getElementById("modalTitle");
    const viewerMedia = document.getElementById("viewerMedia");
    const thumbStrip = document.getElementById("thumbStrip");
    const closeModal = document.getElementById("closeModal");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const modalHomeBtn = document.getElementById("modalHomeBtn");
    const albumsBtn = document.getElementById("albumsBtn");
    const albumSwitchRow = document.getElementById("albumSwitchRow");
    const zoomCloseBtn = document.getElementById("zoomCloseBtn");

    let currentItems = [];
    let currentIndex = 0;
    let currentAlbumPool = [];
    let currentAlbumIndex = 0;
    let currentAlbumName = "";
    let zoomed = false;

    function getAlbumItems(album) {
      if (!album) return [];
      if (album.type === "weekend") {
        return [
          ...(album.days?.saturday?.items || []),
          ...(album.days?.sunday?.items || [])
        ];
      }
      return album.items || [];
    }

    function getAlbumCount(album) {
      return getAlbumItems(album).length;
    }

    function getAlbumCover(album) {
      return (
        album.cover ||
        album.days?.saturday?.cover ||
        album.days?.sunday?.cover ||
        album.days?.saturday?.items?.[0] ||
        album.days?.sunday?.items?.[0] ||
        album.items?.[0] ||
        "photo-header.png"
      );
    }

    function isAlbumLive(album) {
      return Boolean(album && album.published && getAlbumCount(album) > 0);
    }

    function getLiveAlbums() {
      return photoAlbumData
        .filter(isAlbumLive)
        .sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    function renderAlbums() {
      const liveAlbums = getLiveAlbums();

      if (!liveAlbums.length) {
        albumGrid.innerHTML = '<div class="empty-note">No live photo albums yet.</div>';
        return;
      }

      albumGrid.innerHTML = liveAlbums.map((album, index) => `
        <div class="album-card" data-album-index="${index}">
          <img src="${getAlbumCover(album)}" alt="${album.title}">
          <div class="album-info">
            <div class="album-title">${album.title}</div>
            <div class="album-meta">${getAlbumCount(album)} photos<br>${album.location || ""}</div>
          </div>
        </div>
      `).join("");

      document.querySelectorAll("[data-album-index]").forEach(card => {
        card.addEventListener("click", () => {
          const index = Number(card.dataset.albumIndex);
          const selected = liveAlbums[index];
          if (!selected) return;

          if (selected.type === "weekend") {
            openSubalbums(selected, liveAlbums, index);
          } else {
            openViewerForAlbumPool(liveAlbums, index, getAlbumItems(selected), selected.title);
          }
        });
      });
    }

    function openSubalbums(album, pool, poolIndex) {
      albumsView.style.display = "none";
      subalbumsView.style.display = "block";
      subalbumTitle.textContent = album.title;
      subalbumSubtitle.textContent = "Choose a day to open that part of the weekend.";

      const dayCards = [];

      const saturdayItems = album.days?.saturday?.items || [];
      const sundayItems = album.days?.sunday?.items || [];

      if (saturdayItems.length) {
        dayCards.push({
          label: album.days.saturday.label || "Saturday",
          cover: album.days.saturday.cover || saturdayItems[0],
          count: saturdayItems.length,
          items: saturdayItems
        });
      }

      if (sundayItems.length) {
        dayCards.push({
          label: album.days.sunday.label || "Sunday",
          cover: album.days.sunday.cover || sundayItems[0],
          count: sundayItems.length,
          items: sundayItems
        });
      }

      if (!dayCards.length) {
        subalbumGrid.innerHTML = '<div class="empty-note">No live photos in this weekend album yet.</div>';
        return;
      }

      subalbumGrid.innerHTML = dayCards.map((day, index) => `
        <div class="album-card" data-day-index="${index}">
          <img src="${day.cover}" alt="${day.label}">
          <div class="album-info">
            <div class="album-title">${day.label}</div>
            <div class="album-meta">${day.count} photos</div>
          </div>
        </div>
      `).join("");

      document.querySelectorAll("[data-day-index]").forEach(card => {
        card.addEventListener("click", () => {
          const dayIndex = Number(card.dataset.dayIndex);
          const selectedDay = dayCards[dayIndex];
          if (!selectedDay) return;
          openViewerForAlbumPool(pool, poolIndex, selectedDay.items, `${album.title} - ${selectedDay.label}`);
        });
      });
    }

    function openViewerForAlbumPool(pool, poolIndex, items, title) {
      currentAlbumPool = pool;
      currentAlbumIndex = poolIndex;
      currentItems = items;
      currentIndex = 0;
      currentAlbumName = title;
      zoomed = false;

      modalTitle.textContent = title;
      modal.classList.add("active");
      document.body.style.overflow = "hidden";
      renderAlbumSwitches();
      renderViewer();
    }

    function renderAlbumSwitches() {
      albumSwitchRow.innerHTML = currentAlbumPool.map((album, index) => `
        <button class="mini-btn ${currentAlbumIndex === index ? "active" : ""}" data-switch-index="${index}">
          ${album.title}
        </button>
      `).join("");

      albumSwitchRow.querySelectorAll("[data-switch-index]").forEach(btn => {
        btn.addEventListener("click", () => {
          const index = Number(btn.dataset.switchIndex);
          const selected = currentAlbumPool[index];
          if (!selected) return;

          modal.classList.remove("active");
          document.body.style.overflow = "";

          if (selected.type === "weekend") {
            openSubalbums(selected, currentAlbumPool, index);
          } else {
            openViewerForAlbumPool(currentAlbumPool, index, getAlbumItems(selected), selected.title);
          }
        });
      });
    }

    function renderViewer() {
      const file = currentItems[currentIndex];
      if (!file) return;

      viewerMedia.innerHTML = `<img src="${file}" alt="${currentAlbumName} image ${currentIndex + 1}" id="activePhoto">`;

      thumbStrip.innerHTML = currentItems.map((item, index) => `
        <div class="thumb ${index === currentIndex ? "active" : ""}" data-thumb-index="${index}">
          <img src="${item}" alt="Thumbnail ${index + 1}">
        </div>
      `).join("");

      document.querySelectorAll("[data-thumb-index]").forEach(thumb => {
        thumb.addEventListener("click", () => {
          currentIndex = Number(thumb.dataset.thumbIndex);
          renderViewer();
        });
      });

      const activePhoto = document.getElementById("activePhoto");
      viewerMedia.classList.toggle("zoomed", zoomed);
      zoomCloseBtn.classList.toggle("active", zoomed);
      thumbStrip.style.display = zoomed ? "none" : "flex";

      if (activePhoto) {
        activePhoto.addEventListener("click", () => {
          zoomed = true;
          renderViewer();
        });
        activePhoto.addEventListener("dblclick", () => {
          zoomed = false;
          renderViewer();
        });
      }
    }

    function closeViewer() {
      modal.classList.remove("active");
      document.body.style.overflow = "";
      viewerMedia.innerHTML = "";
      thumbStrip.innerHTML = "";
      zoomed = false;
    }

    backToAlbums.addEventListener("click", () => {
      subalbumsView.style.display = "none";
      albumsView.style.display = "block";
    });

    prevBtn.addEventListener("click", () => {
      if (!currentItems.length) return;
      currentIndex = (currentIndex - 1 + currentItems.length) % currentItems.length;
      renderViewer();
    });

    nextBtn.addEventListener("click", () => {
      if (!currentItems.length) return;
      currentIndex = (currentIndex + 1) % currentItems.length;
      renderViewer();
    });

    closeModal.addEventListener("click", closeViewer);
    zoomCloseBtn.addEventListener("click", () => {
      zoomed = false;
      renderViewer();
    });

    modalHomeBtn.addEventListener("click", () => {
      closeViewer();
      window.location.href = "index.html";
    });

    albumsBtn.addEventListener("click", () => {
      closeViewer();
      subalbumsView.style.display = "none";
      albumsView.style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeViewer();
    });

    document.addEventListener("keydown", (e) => {
      if (!modal.classList.contains("active")) return;

      if (e.key === "Escape") {
        if (zoomed) {
          zoomed = false;
          renderViewer();
        } else {
          closeViewer();
        }
      }
      if (e.key === "ArrowLeft" && currentItems.length) {
        currentIndex = (currentIndex - 1 + currentItems.length) % currentItems.length;
        renderViewer();
      }
      if (e.key === "ArrowRight" && currentItems.length) {
        currentIndex = (currentIndex + 1) % currentItems.length;
        renderViewer();
      }
    });

    renderAlbums();
  </script>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
