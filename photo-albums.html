<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Photo Albums</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --orange:#ff6a00;--orange-dark:#cc5200;--text:#ffffff;--muted:#dddddd;
  --panel:rgba(6,6,6,.56);--panel-border:rgba(255,255,255,.12);
  --shadow:0 15px 40px rgba(0,0,0,.35);--radius:18px;--max-width:1300px
}
html{scroll-behavior:smooth}
body{font-family:Arial,sans-serif;background:#000;color:var(--text);overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
img{display:block;max-width:100%}
.hero{position:relative;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;text-align:center;overflow:hidden;background:#000;isolation:isolate}
.hero-bg{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;object-position:38% center;z-index:-4;transform:scale(1.03);filter:brightness(.62) contrast(1.02)}
.section-shell{scroll-margin-top:140px}
.hero-overlay{position:fixed;inset:0;z-index:-3;pointer-events:none;background:
  radial-gradient(circle at 50% 22%,rgba(255,145,40,.05) 0%,rgba(255,145,40,.01) 16%,rgba(0,0,0,0) 32%),
  linear-gradient(to bottom,rgba(0,0,0,.34) 0%,rgba(0,0,0,.30) 14%,rgba(0,0,0,.32) 28%,rgba(0,0,0,.42) 50%,rgba(0,0,0,.56) 74%,rgba(0,0,0,.74) 100%)}
.hero-vignette{position:fixed;inset:0;z-index:-2;pointer-events:none;background:radial-gradient(circle at center,rgba(0,0,0,0) 44%,rgba(0,0,0,.20) 70%,rgba(0,0,0,.38) 100%)}
.hero-inner{width:min(94vw,1300px);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:0 18px 14px}
.hero-content{position:relative;width:100%;max-width:1180px;display:flex;flex-direction:column;align-items:center;gap:4px;animation:fadeUp .8s ease;transform:translateY(-30px)}
.hero-lower{display:flex;flex-direction:column;align-items:center;transform:translateY(0);transition:transform .28s ease;width:100%}
.hero-logo-wrap{position:relative;display:flex;justify-content:center;align-items:center;width:min(92vw,1220px);transition:opacity .28s ease,transform .28s ease}
.hero-logo-wrap::before{content:"";position:absolute;inset:-10px -30px -6px -30px;border-radius:999px;pointer-events:none;background:radial-gradient(circle at center,rgba(0,0,0,0) 36%,rgba(0,0,0,.12) 58%,rgba(0,0,0,.24) 76%,rgba(0,0,0,.34) 100%);filter:blur(18px);z-index:-1}
.hero.scrolled .hero-logo-wrap{opacity:.22;transform:translateY(-10px) scale(.985)}
.hero.scrolled .hero-lower{transform:translateY(-18px)}
.hero-logo{width:min(90vw,900px);height:auto;margin:0 auto 6px;transform:scale(1.28);transform-origin:center center;filter:drop-shadow(0 18px 34px rgba(0,0,0,.46)) drop-shadow(0 0 24px rgba(0,0,0,.20));opacity:.965;pointer-events:none}
.hero-actions{display:flex;flex-wrap:wrap;justify-content:center;gap:18px;margin-top:-16px;margin-bottom:22px;max-width:1100px}
.hero-action,.mini-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:999px;background:rgba(0,0,0,.54);border:1px solid rgba(255,255,255,.20);color:#fff;font-weight:700;transition:.22s ease;box-shadow:var(--shadow);backdrop-filter:blur(4px);cursor:pointer}
.hero-action:hover,.mini-btn:hover,.mini-btn.active{transform:translateY(-2px);background:var(--orange);border-color:transparent}
.content-wrap{position:relative;z-index:2;margin-top:-62px}
.section-shell{width:min(94vw,var(--max-width));margin:0 auto 22px;background:var(--panel);border:1px solid var(--panel-border);border-radius:24px;box-shadow:var(--shadow);backdrop-filter:blur(4px);overflow:hidden}
.section{padding:24px 22px}
.section-title{font-size:clamp(24px,2vw,36px);font-weight:900;text-transform:uppercase;margin-bottom:8px}
.section-subtitle{color:var(--muted);line-height:1.45;margin-bottom:20px}
.album-grid.page-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:18px}
.album-card{position:relative;border-radius:var(--radius);overflow:hidden;min-height:180px;cursor:pointer;border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow);background:#101010;transition:transform .25s ease,box-shadow .25s ease}
.album-card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(0,0,0,.42)}
.album-card img{width:100%;height:100%;object-fit:cover}
.album-card::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.55),rgba(0,0,0,0) 42%)}
.album-info{position:absolute;left:18px;right:18px;bottom:18px;z-index:2}
.album-title{font-size:18px;font-weight:900;margin-bottom:8px}
.album-meta{color:#efefef;font-size:14px}
.modal{position:fixed;inset:0;z-index:999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.82);padding:18px}
.modal.active{display:flex}
.modal-box{position:relative;width:min(96vw,1250px);max-height:94vh;background:rgba(12,12,12,.96);border:1px solid rgba(255,255,255,.08);border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:popFast .18s ease}
.modal-top{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);flex-wrap:wrap}
.modal-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.modal-title{font-weight:900;font-size:20px;text-transform:uppercase}
.close-btn{border:0;background:rgba(0,0,0,.54);color:#fff;width:42px;height:42px;border-radius:999px;font-size:22px;cursor:pointer}
.viewer{position:relative;display:flex;align-items:center;justify-content:center;min-height:65vh;background:#060606;overflow:hidden}
.viewer-media-wrap{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;width:100%;min-height:65vh;padding:10px}
.viewer-media-wrap img,.viewer-media-wrap video{max-width:100%;max-height:68vh;object-fit:contain;display:block}
.viewer-media-wrap img{cursor:zoom-in}
.viewer-media-wrap.zoomed img{cursor:zoom-out}
.viewer-media-wrap video{width:min(100%,1100px);background:#000}
.viewer-media-wrap.zoomed{position:fixed;inset:0;z-index:1002;background:rgba(0,0,0,.96);padding:24px;min-height:100vh}
.viewer-media-wrap.zoomed img{max-width:96vw;max-height:92vh}
.zoom-close{position:fixed;top:18px;right:18px;z-index:1004;width:50px;height:50px;border:0;border-radius:999px;background:rgba(255,255,255,.14);color:#fff;font-size:28px;cursor:pointer;display:none}
.zoom-close.active{display:block}
.viewer-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:1005;width:54px;height:54px;border-radius:999px;border:0;cursor:pointer;background:rgba(0,0,0,.58);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center}
.viewer-prev{left:16px}.viewer-next{right:16px}
.viewer-dust{position:absolute;inset:0;pointer-events:none;z-index:4;opacity:0}
.viewer.dust-burst .viewer-dust{opacity:1;animation:dustBurst .65s ease forwards}
.viewer-dust::before,.viewer-dust::after{content:"";position:absolute;top:50%;width:340px;height:340px;border-radius:999px;transform:translateY(-50%);background:radial-gradient(circle,rgba(183,126,63,.72) 0%,rgba(160,104,44,.52) 22%,rgba(120,78,34,.28) 44%,rgba(88,57,25,.12) 62%,rgba(88,57,25,0) 80%);filter:blur(7px)}
.viewer-dust::before{left:-90px}.viewer-dust::after{right:-90px}
.thumb-strip{display:flex;gap:10px;overflow-x:auto;padding:14px 16px 16px;background:rgba(255,255,255,.03);border-top:1px solid rgba(255,255,255,.08)}
.thumb{flex:0 0 auto;width:96px;height:72px;border-radius:12px;overflow:hidden;border:2px solid transparent;cursor:pointer;background:#111}
.thumb.active{border-color:var(--orange)}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover}
.back-to-top{position:fixed;right:20px;bottom:20px;z-index:1100;width:52px;height:52px;border:0;border-radius:999px;background:rgba(0,0,0,.62);color:#fff;font-size:24px;cursor:pointer;box-shadow:0 10px 24px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(6px);opacity:0;visibility:hidden;transform:translateY(10px);transition:opacity .22s ease,transform .22s ease,visibility .22s ease,background .22s ease}
.back-to-top.show{opacity:1;visibility:visible;transform:translateY(0)}
.back-to-top:hover{background:var(--orange)}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes popFast{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes dustBurst{0%{opacity:1}100%{opacity:0}}
@media (max-width:1050px){.album-grid.page-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:760px){
.hero-bg{object-position:50% center}.hero-inner{padding:10px 14px 18px}.hero-content{transform:translateY(-20px)}.hero-lower{transform:translateY(0)}
.hero-logo{width:min(96vw,760px);margin-bottom:4px;transform:scale(1.18);transform-origin:center center}.hero-actions{flex-direction:column;width:100%;align-items:center}
.hero-action,.mini-btn{width:min(88vw,360px)}.content-wrap{margin-top:-42px}.album-grid.page-grid{grid-template-columns:1fr}.section{padding:20px 14px}
.viewer{min-height:48vh}.viewer-media-wrap{min-height:48vh}.viewer-nav{width:46px;height:46px}.modal-left{width:100%}.zoom-close{top:12px;right:12px}.back-to-top{width:48px;height:48px;right:14px;bottom:14px}
}
</style>

</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="instagramGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#feda75"></stop>
      <stop offset="35%" stop-color="#fa7e1e"></stop>
      <stop offset="60%" stop-color="#d62976"></stop>
      <stop offset="85%" stop-color="#962fbf"></stop>
      <stop offset="100%" stop-color="#4f5bd5"></stop>
    </linearGradient>
  </defs>
</svg>

<section class="hero" id="top" style="min-height:auto; padding-bottom:20px;">
  <img src="background.png" alt="Mud riding background" class="hero-bg" />
  <div class="hero-overlay"></div>
  <div class="hero-vignette"></div>

  <div class="hero-inner" style="min-height:auto;">
    <div class="hero-content">
      <div class="hero-logo-wrap" style="width:min(94vw, 1100px);">
        <img src="photo-header.png" alt="Photo Albums" class="hero-logo" />
      </div>

      <div class="hero-lower">
        <div class="hero-actions">
          <a href="index.html" class="hero-action">Home</a>
          <a href="photo-albums.html" class="hero-action">Photo Albums</a>
          <a href="video-albums.html" class="hero-action">Video Albums</a>
        </div>
      </div>
    </div>
  </div>
</section>

<div class="content-wrap">
  <div class="section-shell">
    <section class="section">
      <div class="section-title">Photo Albums</div>
      <div class="section-subtitle">All photo albums live here. Same look, smaller cards, click any album to open it.</div>
      <div class="album-grid page-grid" id="pageAlbums"></div>
    </section>
  </div>
</div>

<button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>

<div class="modal" id="mediaModal" aria-hidden="true">
  <div class="modal-box">
    <div class="modal-top">
      <div class="modal-left">
        <button class="mini-btn" id="modalHomeBtn">Home</button>
        <button class="mini-btn" id="fullPhotoAlbumsBtn">Full Photo Albums</button>
        <button class="mini-btn" id="fullVideoAlbumsBtn">Full Video Albums</button>
        <div class="modal-title" id="modalTitle">Album Viewer</div>
      </div>

      <div class="modal-left" id="albumSwitchRow"></div>

      <button class="close-btn" id="closeModal" aria-label="Close">×</button>
    </div>

    <div class="viewer" id="viewer">
      <button class="viewer-nav viewer-prev" id="prevBtn" aria-label="Previous">‹</button>
      <div class="viewer-dust"></div>
      <div class="viewer-media-wrap" id="viewerMedia"></div>
      <button class="viewer-nav viewer-next" id="nextBtn" aria-label="Next">›</button>
      <button class="zoom-close" id="zoomCloseBtn" aria-label="Exit fullscreen">×</button>
    </div>

    <div class="thumb-strip" id="thumbStrip"></div>
  </div>
</div>


<script>
const photoAlbums = [
  {
    title: "Photo Album 1",
    cover: "media/photos/album1/img1.jpg",
    items: ["media/photos/album1/img1.jpg","media/photos/album1/img2.jpg","media/photos/album1/img3.jpg","media/photos/album1/img4.jpg","media/photos/album1/img5.jpg"]
  },
  {
    title: "Photo Album 2",
    cover: "media/photos/album2/img1.jpg",
    items: ["media/photos/album2/img1.jpg","media/photos/album2/img2.jpg","media/photos/album2/img3.jpg","media/photos/album2/img4.jpg","media/photos/album2/img5.jpg"]
  },
  {
    title: "Photo Album 3",
    cover: "media/photos/album3/img1.jpg",
    items: ["media/photos/album3/img1.jpg","media/photos/album3/img2.jpg","media/photos/album3/img3.jpg","media/photos/album3/img4.jpg","media/photos/album3/img5.jpg"]
  }
];
const videoAlbums = [
  {
    title: "Video Album 1",
    cover: "media/photos/album1/img2.jpg",
    items: ["media/videos/album1/vid1.mp4","media/videos/album1/vid2.mp4"]
  },
  {
    title: "Video Album 2",
    cover: "media/photos/album2/img2.jpg",
    items: ["media/videos/album2/vid1.mp4","media/videos/album2/vid2.mp4"]
  },
  {
    title: "Video Album 3",
    cover: "media/photos/album3/img2.jpg",
    items: ["media/videos/album3/vid1.mp4","media/videos/album3/vid2.mp4"]
  }
];

const gridEl = document.getElementById("pageAlbums");
const modal = document.getElementById("mediaModal");
const modalTitle = document.getElementById("modalTitle");
const viewerMedia = document.getElementById("viewerMedia");
const thumbStrip = document.getElementById("thumbStrip");
const closeModal = document.getElementById("closeModal");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const viewer = document.getElementById("viewer");
const modalHomeBtn = document.getElementById("modalHomeBtn");
const albumSwitchRow = document.getElementById("albumSwitchRow");
const zoomCloseBtn = document.getElementById("zoomCloseBtn");
const fullPhotoAlbumsBtn = document.getElementById("fullPhotoAlbumsBtn");
const fullVideoAlbumsBtn = document.getElementById("fullVideoAlbumsBtn");
const backToTop = document.getElementById("backToTop");

let currentAlbum = [];
let currentIndex = 0;
let currentType = "photo";
let currentAlbumTitle = "";
let currentAlbumIndex = 0;
let zoomed = false;

function createPageCards() {
  const source = photoAlbums;
  gridEl.innerHTML = source.map((album, index) => `
    <div class="album-card" data-type="photo" data-album="${index}">
      <img src="${album.cover}" alt="${album.title}">
      <div class="album-info">
        <div class="album-title">${album.title}</div>
        <div class="album-meta">${album.items.length} photos</div>
      </div>
    </div>
  `).join("");
}

function renderAlbumSwitches() {
  const photoTabs = photoAlbums.map((album, index) => `
    <button class="mini-btn ${currentType === 'photo' && currentAlbumIndex === index ? 'active' : ''}"
      data-switch-type="photo" data-switch-index="${index}">
      ${album.title}
    </button>
  `).join("");

  const videoTabs = videoAlbums.map((album, index) => `
    <button class="mini-btn ${currentType === 'video' && currentAlbumIndex === index ? 'active' : ''}"
      data-switch-type="video" data-switch-index="${index}">
      ${album.title}
    </button>
  `).join("");

  albumSwitchRow.innerHTML = currentType === "photo"
    ? photoTabs + `<button class="mini-btn" id="jumpVideoPageBtn">Videos Page</button>`
    : `<button class="mini-btn" id="jumpPhotoPageBtn">Photos Page</button>` + videoTabs;

  albumSwitchRow.querySelectorAll("[data-switch-type]").forEach(btn => {
    btn.addEventListener("click", () => {
      openAlbum(btn.dataset.switchType, Number(btn.dataset.switchIndex));
    });
  });

  const jumpVideoPageBtn = document.getElementById("jumpVideoPageBtn");
  if (jumpVideoPageBtn) jumpVideoPageBtn.addEventListener("click", () => {
    closeViewer();
    window.location.href = "video-albums.html";
  });

  const jumpPhotoPageBtn = document.getElementById("jumpPhotoPageBtn");
  if (jumpPhotoPageBtn) jumpPhotoPageBtn.addEventListener("click", () => {
    closeViewer();
    window.location.href = "photo-albums.html";
  });
}

function wireThumbs() {
  document.querySelectorAll(".thumb").forEach(thumb => {
    thumb.addEventListener("click", () => {
      currentIndex = Number(thumb.dataset.index);
      renderViewer();
    });
  });
}

function setZoomState(state) {
  zoomed = state;
  const activePhoto = document.getElementById("activePhoto");
  viewerMedia.classList.toggle("zoomed", state);
  zoomCloseBtn.classList.toggle("active", state);
  thumbStrip.style.display = state ? "none" : "flex";
  if (activePhoto) activePhoto.style.cursor = state ? "zoom-out" : "zoom-in";
}

function wireImageZoom() {
  const activePhoto = document.getElementById("activePhoto");
  if (!activePhoto) return;
  activePhoto.addEventListener("click", () => setZoomState(true));
  activePhoto.addEventListener("dblclick", () => setZoomState(false));
}

function burstDust() {
  viewer.classList.remove("dust-burst");
  void viewer.offsetWidth;
  viewer.classList.add("dust-burst");
}

function openAlbum(type, albumIndex) {
  currentType = type;
  currentAlbumIndex = albumIndex;
  const source = type === "photo" ? photoAlbums : videoAlbums;
  const selected = source[albumIndex];
  currentAlbum = selected.items;
  currentIndex = 0;
  currentAlbumTitle = selected.title;
  zoomed = false;
  modalTitle.textContent = selected.title;
  modal.classList.add("active");
  document.body.style.overflow = "hidden";
  renderAlbumSwitches();
  renderViewer();
}

function renderViewer() {
  const file = currentAlbum[currentIndex];
  const isVideo = currentType === "video";
  if (isVideo) {
    viewerMedia.innerHTML = `<video src="${file}" controls playsinline></video>`;
  } else {
    viewerMedia.innerHTML = `<img src="${file}" alt="${currentAlbumTitle} image ${currentIndex + 1}" id="activePhoto">`;
  }

  thumbStrip.innerHTML = currentAlbum.map((item, index) => {
    const activeClass = index === currentIndex ? "thumb active" : "thumb";
    if (currentType === "video") {
      return `<div class="${activeClass}" data-index="${index}"><video src="${item}" muted></video></div>`;
    }
    return `<div class="${activeClass}" data-index="${index}"><img src="${item}" alt="Thumbnail ${index + 1}"></div>`;
  }).join("");

  burstDust();
  wireThumbs();
  wireImageZoom();
  setZoomState(zoomed);
}

function showPrev() {
  currentIndex = (currentIndex - 1 + currentAlbum.length) % currentAlbum.length;
  renderViewer();
}

function showNext() {
  currentIndex = (currentIndex + 1) % currentAlbum.length;
  renderViewer();
}

function closeViewer() {
  modal.classList.remove("active");
  document.body.style.overflow = "";
  viewerMedia.innerHTML = "";
  thumbStrip.innerHTML = "";
  setZoomState(false);
}

function wireAlbumClicks() {
  document.querySelectorAll("[data-type][data-album]").forEach(card => {
    card.addEventListener("click", () => {
      openAlbum(card.dataset.type, Number(card.dataset.album));
    });
  });
}

prevBtn.addEventListener("click", showPrev);
nextBtn.addEventListener("click", showNext);
closeModal.addEventListener("click", closeViewer);
zoomCloseBtn.addEventListener("click", () => setZoomState(false));
modalHomeBtn.addEventListener("click", () => { closeViewer(); window.location.href = "index.html"; });
fullPhotoAlbumsBtn.addEventListener("click", () => { closeViewer(); window.location.href = "photo-albums.html"; });
fullVideoAlbumsBtn.addEventListener("click", () => { closeViewer(); window.location.href = "video-albums.html"; });
modal.addEventListener("click", (e) => { if (e.target === modal) closeViewer(); });

document.addEventListener("keydown", (e) => {
  if (!modal.classList.contains("active")) return;
  if (e.key === "Escape") { if (zoomed) setZoomState(false); else closeViewer(); }
  if (e.key === "ArrowLeft") showPrev();
  if (e.key === "ArrowRight") showNext();
});

window.addEventListener("scroll", () => {
  if (window.scrollY > 18) document.querySelector(".hero")?.classList.add("scrolled");
  else document.querySelector(".hero")?.classList.remove("scrolled");

  if (window.scrollY > 250) backToTop.classList.add("show");
  else backToTop.classList.remove("show");
});

backToTop.addEventListener("click", () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
});

createPageCards();
wireAlbumClicks();
</script>

</body>
</html>
