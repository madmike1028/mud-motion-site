<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Photo Albums - Mud & Motion</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

.album-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
}

.album-card {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.album-card:hover {
  background: rgba(255,255,255,0.1);
}

.folder-view {
  display: none;
}

.back-btn {
  margin-bottom: 20px;
  cursor: pointer;
  color: #ff6a00;
}
</style>
</head>

<body>

<div class="container">

<h1>Photo Albums</h1>

<div id="albumList" class="album-grid"></div>

<div id="folderView" class="folder-view">
  <div class="back-btn" onclick="goBack()">⬅ Back to Albums</div>
  <h2 id="folderTitle"></h2>
  <div id="folderContent" class="album-grid"></div>
</div>

</div>

<script>
function renderAlbums(albums) {
  const container = document.getElementById("albumList");
  container.innerHTML = "";

  albums.forEach(album => {
    const card = document.createElement("div");
    card.className = "album-card";
    card.innerHTML = `<h3>${album.name}</h3>`;

    card.onclick = () => openAlbum(album);

    container.appendChild(card);
  });
}

function openAlbum(album) {
  document.getElementById("albumList").style.display = "none";
  document.getElementById("folderView").style.display = "block";

  document.getElementById("folderTitle").innerText = album.name;

  const content = document.getElementById("folderContent");
  content.innerHTML = "";

  if (album.folders) {
    Object.keys(album.folders).forEach(day => {
      const card = document.createElement("div");
      card.className = "album-card";
      card.innerHTML = `<h3>${day}</h3>`;

      card.onclick = () => openViewer(album.folders[day]);

      content.appendChild(card);
    });
  } else if (album.images) {
    openViewer(album.images);
  }
}

function goBack() {
  document.getElementById("folderView").style.display = "none";
  document.getElementById("albumList").style.display = "grid";
}

function openViewer(images) {
  alert("Viewer will open here (your existing system handles this)");
}

// Demo data
renderAlbums([
  {
    name: "Dry Branch GP",
    folders: {
      Saturday: ["img1.jpg","img2.jpg"],
      Sunday: ["img3.jpg"]
    }
  },
  {
    name: "Mad Bass GP",
    folders: {
      Saturday: ["img1.jpg"],
      Sunday: ["img2.jpg"]
    }
  },
  {
    name: "Jody",
    images: ["img1.jpg","img2.jpg"]
  }
]);
</script>

</body>
</html>
